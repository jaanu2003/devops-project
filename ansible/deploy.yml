---
- hosts: web
  become: true

  tasks:
    - name: Ensure git is installed
      apt:
        name: git
        state: present
        update_cache: true

    - name: Pull latest code from GitHub
      git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dest }}"
        version: "{{ app_branch }}"
        force: true

    - name: Stop old container
      shell: docker stop {{ container_name }} || true
      changed_when: false

    - name: Remove old container
      shell: docker rm {{ container_name }} || true
      changed_when: false

    - name: Build Docker image
      shell: docker build -t {{ image_name }} {{ app_dest }}

    - name: Run Docker container
      shell: >
        docker run -d
        -p {{ app_port }}:{{ app_port }}
        --name {{ container_name }}
        {{ image_name }}

    - name: Wait for app port
      wait_for:
        port: "{{ app_port }}"
        host: localhost
        delay: 3
        timeout: 60
